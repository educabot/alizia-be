version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
    - bodyclose
    - nilerr

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/educabot/alizia-be

exclusions:
  paths:
    - docs/.*
    - db/.*
    - scripts/.*
