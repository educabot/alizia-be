run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - nilerr

linters-settings:
  goimports:
    local-prefixes: github.com/educabot/alizia-be

issues:
  exclude-dirs:
    - docs
    - db
    - scripts
