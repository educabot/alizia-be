version: "2"

run:
  timeout: 5m
  exclude-dirs:
    - docs
    - db
    - scripts

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
    - bodyclose
    - nilerr

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/educabot/alizia-be
