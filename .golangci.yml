version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose
    - nilerr
    - gosec
    - errorlint
  exclusions:
    paths:
      - docs/.*
      - db/.*
      - scripts/.*

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/educabot/alizia-be
